name: Build & Deploy Dashboard UI

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard-ui/**'
      - 'data/aggregated/dashboard.json'
  workflow_run:
    workflows: ['Collect & Aggregate Metrics']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Only deploy after a successful collect run (or direct triggers)
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard-ui/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard-ui
        run: npm ci

      - name: Copy dashboard data into public folder
        run: |
          mkdir -p apps/dashboard-ui/public
          cp data/aggregated/dashboard.json apps/dashboard-ui/public/dashboard.json \
            || echo '{}' > apps/dashboard-ui/public/dashboard.json

      - name: Build production bundle
        working-directory: apps/dashboard-ui
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/dashboard-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
